<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>B2B Hotel Network 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Vazirmatn:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />

<style>
:root {
  /* 2026 LIGHT SaaS PREMIUM PALETTE */

  --purple-900: #2b1b4a;
  --purple-800: #3b2a66;
  --purple-700: #5b3bbf;
  --purple-600: #6d4aff;
  --purple-500: #7c5cff;
  --purple-400: #a89bff;
  --purple-100: #f4f2ff;
  --purple-50:  #faf9ff;

  --amber-500: #f6b100;
  --amber-400: #ffcc4d;
  --amber-300: #ffe08a;
  --amber-100: #fff7df;

  --ink:   #141226;
  --ink-2: #3a3550;
  --ink-3: #7a748f;
  --ink-4: #b9b3c9;

  --white: #ffffff;

  --bg: #f6f7fb;

  --border: #e9eaf3;
  --border-lt: #f2f3f8;

  --shadow-sm: 0 2px 10px rgba(20, 18, 38, .04);
  --shadow-md: 0 10px 30px rgba(20, 18, 38, .06);
  --shadow-lg: 0 20px 50px rgba(20, 18, 38, .08);

  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 18px;
  --r-xl: 26px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #2b1b4a 0%, #4c3aa8 50%, #6d4aff 100%);
  padding: 0 24px 28px;
  position: relative;
  overflow: hidden;
}

.header::before,
.header::after {
  content: '';
  position: absolute;
  border-radius: 50%;
}

.header::before {
  width: 420px;
  height: 420px;
  top: -120px;
  right: -80px;
  background: radial-gradient(circle, rgba(124,92,255,.18), transparent 65%);
}

.header::after {
  width: 300px;
  height: 300px;
  bottom: -80px;
  left: 10%;
  background: radial-gradient(circle, rgba(255,204,77,.10), transparent 70%);
}

.header-inner {
  max-width: 1400px;
  margin: auto;
  padding-top: 18px;
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, #ffcc4d, #f6b100);
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-text {
  font-weight: 800;
  color: #fff;
}

.logo-text span {
  color: var(--amber-400);
}

.nav a {
  color: rgba(255,255,255,.7);
  text-decoration: none;
  margin-left: 12px;
  font-size: 13px;
}

/* HERO */
.hero-text {
  margin-top: 18px;
  padding: 20px;
  border-radius: var(--r-lg);
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.15);
  backdrop-filter: blur(16px);
}

.fa-tagline {
  font-family: Vazirmatn;
  color: #fff;
  font-size: 14px;
  line-height: 2;
  text-align: right;
  direction: rtl;
}

.hero-chips {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.chip {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(255,204,77,.15);
  color: var(--amber-300);
  border: 1px solid rgba(255,204,77,.25);
}

/* CITY TABS */
.city-tabs {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-top: 18px;
}

.ctab {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: var(--r-md);
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: .2s;
  color: #fff;
}

.ctab.active {
  border-color: var(--amber-400);
  background: rgba(255,255,255,.15);
}

/* MAIN */
.container {
  max-width: 1400px;
  margin: 30px auto;
  padding: 0 24px;
}

/* TABLE */
.table-wrapper {
  background: #fff;
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  text-transform: uppercase;
  font-size: 11px;
  color: var(--ink-3);
  background: #faf9ff;
  padding: 14px;
  text-align: left;
}

tbody td {
  padding: 14px;
  border-bottom: 1px solid var(--border-lt);
  font-size: 13px;
}

tbody tr:hover td {
  background: #f7f6ff;
}

/* badges */
.star-badge {
  background: #fff7df;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
}

.rate-badge {
  background: var(--purple-100);
  padding: 5px 12px;
  border-radius: 8px;
  font-weight: 700;
}

/* FOOTER */
.footer {
  margin-top: 40px;
  padding: 30px;
  background: linear-gradient(135deg, #2b1b4a, #4c3aa8);
  color: #fff;
  text-align: center;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-inner">

    <div class="top-bar">
      <div class="logo">
        <div class="logo-mark">🏨</div>
        <div class="logo-text">B2B <span>Hotel</span> Network 2026</div>
      </div>
      <div class="nav">
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>
    </div>

    <div class="city-tabs" id="cityTabs"></div>

    <div class="hero-text">
      <div class="fa-tagline">
        رزرو تخصصی هتل برای آژانس‌های گردشگری؛ اتصال مستقیم به تأمین‌کنندگان؛
        استعلام و رزرو سریع با نرخ همکاری و پشتیبانی اختصاصی.
      </div>
      <div class="hero-chips">
        <span class="chip">نرخ همکاری</span>
        <span class="chip">تأیید سریع</span>
        <span class="chip">اتصال مستقیم</span>
      </div>
    </div>

  </div>
</div>

<div class="container">

  <
