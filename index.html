<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Hotel Board</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter', Arial, sans-serif;
    margin:0;
    background:#f5f6fa;
    color:#111827;
}

/* HEADER */
.header{
    background:#0b1220;
    color:white;
    padding:18px 20px;
}

.header-inner{
    max-width:1100px;
    margin:auto;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:18px;
    font-weight:600;
}

.nav a{
    color:#cbd5e1;
    margin-left:14px;
    text-decoration:none;
    font-size:13px;
}

.nav a:hover{ color:white; }

.desc{
    margin-top:10px;
    font-size:12.5px;
    color:#94a3b8;
    line-height:1.5;
}

/* MAIN */
.container{
    max-width:1100px;
    margin:20px auto;
    padding:0 20px;
}

.title{
    font-size:18px;
    font-weight:600;
    margin-bottom:12px;
}

/* CITY CARDS */
.city-filters{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
}

/* base card */
.city{
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:13px;
    font-weight:500;
    transition:0.2s;
    user-select:none;
    border:1px solid transparent;
}

/* ALL */
.city.all{
    background:#eef2ff;
    color:#1e3a8a;
}

/* ISTANBUL (red + white vibe) */
.city.istanbul{
    background:#fee2e2;
    color:#991b1b;
}

/* BAKU (blue + green vibe) */
.city.baku{
    background:#dcfce7;
    color:#166534;
}

/* MOSCOW (red + deep tone) */
.city.moscow{
    background:#e0e7ff;
    color:#1e3a8a;
}

/* active */
.city.active{
    border:2px solid #111827;
    transform:scale(1.03);
}

/* CONTROLS */
.controls{
    display:flex;
    gap:10px;
    margin-bottom:12px;
    flex-wrap:wrap;
}

input,button{
    padding:10px 12px;
    border:1px solid #e5e7eb;
    border-radius:8px;
    font-size:13px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

/* TABLE */
.table-wrapper{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
}

.scroll{
    max-height:520px;
    overflow-y:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

thead th{
    background:#f9fafb;
    position:sticky;
    top:0;
    padding:12px;
    text-align:left;
    border-bottom:1px solid #e5e7eb;
}

tbody td{
    padding:12px;
    border-bottom:1px solid #f1f5f9;
}

tbody tr:hover{
    background:#f8fafc;
}

.city-col{
    font-weight:600;
}

.stars{ color:#fbbf24; }
.price{ font-weight:600; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-inner">

        <div class="top-bar">
            <div class="logo">B2B Hotel Network</div>

            <div class="nav">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">WhatsApp</a>
                <a href="#">Telegram</a>
            </div>
        </div>

        <div class="desc">
            Professional B2B hotel rate platform for Istanbul, Baku, and Moscow. Powered by global hotel APIs and travel industry systems.
        </div>

    </div>
</div>

<!-- MAIN -->
<div class="container">

<div class="title">Hotel Rate Dashboard</div>

<!-- CITY FILTER CARDS -->
<div class="city-filters">
    <div class="city all active" onclick="setCity('all', this)">All Cities</div>
    <div class="city istanbul" onclick="setCity('Istanbul', this)">Istanbul</div>
    <div class="city baku" onclick="setCity('Baku', this)">Baku</div>
    <div class="city moscow" onclick="setCity('Moscow', this)">Moscow</div>
</div>

<!-- SEARCH -->
<div class="controls">
    <input id="search" placeholder="Search hotel...">
    <button onclick="sortPrice()">Sort Price</button>
</div>

<!-- TABLE -->
<div class="table-wrapper">
<div class="scroll">
<table>
<thead>
<tr>
<th>City</th>
<th>Hotel Name</th>
<th>Stars</th>
<th>Rate</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>
</div>
</div>

</div>

<script>

const data = [
{city:"Istanbul",name:"Hilton Bosphorus",stars:5,price:180},
{city:"Istanbul",name:"Marriott Istanbul",stars:4,price:150},
{city:"Istanbul",name:"Ramada Plaza",stars:4,price:120},
{city:"Istanbul",name:"Swissotel",stars:5,price:220},
{city:"Istanbul",name:"Elite World",stars:4,price:110},

{city:"Baku",name:"Fairmont Baku",stars:5,price:200},
{city:"Baku",name:"JW Marriott",stars:5,price:230},
{city:"Baku",name:"Holiday Inn",stars:4,price:130},
{city:"Baku",name:"Hilton Baku",stars:5,price:210},
{city:"Baku",name:"Park Inn",stars:4,price:120},

{city:"Moscow",name:"Radisson",stars:5,price:250},
{city:"Moscow",name:"Ritz Carlton",stars:5,price:400},
{city:"Moscow",name:"Azimut",stars:4,price:140},
{city:"Moscow",name:"Metropol",stars:5,price:300},
{city:"Moscow",name:"Holiday Inn",stars:4,price:160},
];

let currentCity = "all";
let sorted = false;

/* RENDER */
function render(list){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    list.forEach(h=>{
        tbody.innerHTML += `
        <tr>
            <td class="city-col">${h.city}</td>
            <td>${h.name}</td>
            <td class="stars">${"⭐".repeat(h.stars)}</td>
            <td class="price">$${h.price}/night</td>
        </tr>
        `;
    });
}

/* CITY FILTER */
function setCity(city, el){
    currentCity = city;

    document.querySelectorAll(".city").forEach(c=>{
        c.classList.remove("active");
    });
    el.classList.add("active");

    applyFilters();
}

/* SEARCH + CITY */
function applyFilters(){
    let search = document.getElementById("search").value.toLowerCase();

    let filtered = data.filter(h=>{
        return (currentCity === "all" || h.city === currentCity) &&
               h.name.toLowerCase().includes(search);
    });

    render(filtered);
}

/* SORT */
function sortPrice(){
    let filtered = [...data].filter(h=>{
        return currentCity === "all" || h.city === currentCity;
    });

    filtered.sort((a,b)=>
        sorted ? a.price-b.price : b.price-a.price
    );

    sorted = !sorted;
    render(filtered);
}

/* EVENTS */
document.getElementById("search").addEventListener("input", applyFilters);

render(data);

</script>

</body>
</html>
