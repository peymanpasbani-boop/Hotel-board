<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Hotel Board</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f6fa;
    margin:0;
    padding:0;
    color:#111827;
}

/* ===== HEADER ===== */
.header{
    background:#0b1220;
    color:white;
    padding:16px 20px;
}

.header-inner{
    max-width:1100px;
    margin:auto;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:18px;
    font-weight:600;
    letter-spacing:0.5px;
}

.nav a{
    color:#cbd5e1;
    margin-left:14px;
    text-decoration:none;
    font-size:13px;
}

.nav a:hover{
    color:white;
}

.desc{
    margin-top:10px;
    font-size:12.5px;
    color:#94a3b8;
    line-height:1.5;
    max-width:900px;
}

/* ===== MAIN ===== */
.container{
    max-width:1100px;
    margin:20px auto;
    padding:0 20px;
}

.title{
    font-size:18px;
    font-weight:600;
    margin-bottom:12px;
}

/* Controls */
.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
}

input,select,button{
    padding:9px 10px;
    border:1px solid #e5e7eb;
    border-radius:6px;
    font-size:13px;
    outline:none;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* ===== TABLE ===== */
.table-wrapper{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 1px 10px rgba(0,0,0,0.05);
}

.scroll{
    max-height:520px;
    overflow-y:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

thead th{
    background:#f9fafb;
    position:sticky;
    top:0;
    text-align:left;
    padding:12px;
    border-bottom:1px solid #e5e7eb;
    color:#374151;
    font-weight:600;
}

tbody td{
    padding:12px;
    border-bottom:1px solid #f1f5f9;
}

tbody tr:hover{
    background:#f8fafc;
}

.city{
    font-weight:600;
    color:#111827;
}

.stars{
    color:#fbbf24;
}
.price{
    font-weight:600;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-inner">

        <div class="top-bar">
            <div class="logo">B2B Hotel Network</div>

            <div class="nav">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">WhatsApp</a>
                <a href="#">Telegram</a>
            </div>
        </div>

        <div class="desc">
            Professional B2B hotel booking solutions in Istanbul, Baku, and Moscow.  
            Powered by global hotel APIs and Amadeus expertise, we provide fast, accurate, and scalable pricing access for travel agencies.
        </div>

    </div>
</div>

<!-- MAIN -->
<div class="container">

<div class="title">Hotel Price Dashboard</div>

<div class="controls">
    <input id="search" placeholder="Search hotel...">
    
    <select id="cityFilter">
        <option value="all">All Cities</option>
        <option value="Istanbul">Istanbul</option>
        <option value="Baku">Baku</option>
        <option value="Moscow">Moscow</option>
    </select>

    <button onclick="sortPrice()">Sort Price</button>
</div>

<div class="table-wrapper">
<div class="scroll">
<table>
<thead>
<tr>
<th>City</th>
<th>Hotel</th>
<th>Rating</th>
<th>Price</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>
</div>
</div>

</div>

<script>
const data = [
{city:"Istanbul",name:"Hilton Bosphorus",stars:5,price:180},
{city:"Istanbul",name:"Marriott Istanbul",stars:4,price:150},
{city:"Istanbul",name:"Ramada Plaza",stars:4,price:120},
{city:"Istanbul",name:"Swissotel",stars:5,price:220},
{city:"Istanbul",name:"Elite World",stars:4,price:110},

{city:"Baku",name:"Fairmont Baku",stars:5,price:200},
{city:"Baku",name:"JW Marriott",stars:5,price:230},
{city:"Baku",name:"Holiday Inn",stars:4,price:130},
{city:"Baku",name:"Hilton Baku",stars:5,price:210},
{city:"Baku",name:"Park Inn",stars:4,price:120},

{city:"Moscow",name:"Radisson",stars:5,price:250},
{city:"Moscow",name:"Ritz Carlton",stars:5,price:400},
{city:"Moscow",name:"Azimut",stars:4,price:140},
{city:"Moscow",name:"Metropol",stars:5,price:300},
{city:"Moscow",name:"Holiday Inn",stars:4,price:160},
];

let sorted = false;

function render(list){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    list.forEach(h=>{
        tbody.innerHTML += `
        <tr>
            <td class="city">${h.city}</td>
            <td>${h.name}</td>
            <td class="stars">${"⭐".repeat(h.stars)}</td>
            <td class="price">$${h.price}/night</td>
        </tr>
        `;
    });
}

function filter(){
    let search = document.getElementById("search").value.toLowerCase();
    let city = document.getElementById("cityFilter").value;

    let filtered = data.filter(h=>{
        return (city==="all" || h.city===city) &&
               h.name.toLowerCase().includes(search);
    });

    render(filtered);
}

function sortPrice(){
    let sortedData = [...data].sort((a,b)=>
        sorted ? a.price-b.price : b.price-a.price
    );
    sorted = !sorted;
    render(sortedData);
}

document.getElementById("search").addEventListener("input",filter);
document.getElementById("cityFilter").addEventListener("change",filter);

render(data);
</script>

</body>
</html>
